[build]
  command = "mkdir -p public/media && cp -r ../clients/${CLIENT_SLUG:-burger-demo}/content/media/. public/media/ && npm run build"
  publish = "dist"
  ignore = "git diff --quiet ${CACHED_COMMIT_REF:-HEAD~1} $COMMIT_REF -- . ../clients/${CLIENT_SLUG:-burger-demo}/"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/"
  to = "/admin/index.html"
  status = 200
