name: Rebuild & redeploy existing client
on:
  workflow_dispatch:
    inputs:
      client_slug:
        description: 'Slug cliente da rideploy (es. basso2)'
        required: true
      template:
        description: 'Template da usare'
        required: true
        default: 'template-01'
        type: choice
        options: ['template-01', 'template-02']
      default_lang:
        description: 'Lingua principale'
        required: true
        default: 'it'
        type: choice
        options: ['it', 'en']

jobs:
  rebuild:
    runs-on: ubuntu-latest

    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Read site_id from netlify.json
        run: |
          SLUG=${{ inputs.client_slug }}
          NETLIFY_JSON="clients/$SLUG/netlify.json"
          if [ ! -f "$NETLIFY_JSON" ]; then
            echo "❌ $NETLIFY_JSON non trovato"
            exit 1
          fi
          SITE_ID=$(jq -r '.site_id' "$NETLIFY_JSON")
          SITE_URL=$(jq -r '.site_url' "$NETLIFY_JSON")
          echo "Sito: $SITE_URL (id=$SITE_ID)"
          echo "NETLIFY_SITE_ID=$SITE_ID" >> $GITHUB_ENV

      - name: Update Netlify build settings
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
        run: |
          echo "Aggiorno base → ${{ inputs.template }}"
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH \
            "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID" \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"build_settings": {"base": "${{ inputs.template }}", "cmd": "npm run build", "dir": "dist"}}')
          [ "$HTTP" = "200" ] && echo "✅ Build settings aggiornate" || echo "::warning::Build settings non aggiornate (HTTP $HTTP)"

      - name: Update Netlify env vars
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
          NETLIFY_ACCOUNT_ID: ${{ secrets.NETLIFY_ACCOUNT_ID }}
        run: |
          # Elimina le env var esistenti e ricreale con i nuovi valori
          for KEY in CLIENT_SLUG DEFAULT_LANG; do
            curl -s -o /dev/null -X DELETE \
              "https://api.netlify.com/api/v1/accounts/$NETLIFY_ACCOUNT_ID/env/$KEY?site_id=$NETLIFY_SITE_ID" \
              -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN"
          done
          RESULT=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://api.netlify.com/api/v1/accounts/$NETLIFY_ACCOUNT_ID/env?site_id=$NETLIFY_SITE_ID" \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "[
              {\"key\": \"CLIENT_SLUG\", \"scopes\": [\"builds\",\"functions\",\"runtime\",\"post_processing\"], \"values\": [{\"context\": \"all\", \"value\": \"${{ inputs.client_slug }}\"}]},
              {\"key\": \"DEFAULT_LANG\", \"scopes\": [\"builds\",\"functions\",\"runtime\",\"post_processing\"], \"values\": [{\"context\": \"all\", \"value\": \"${{ inputs.default_lang }}\"}]}
            ]")
          [ "$RESULT" = "201" ] && echo "✅ Env vars aggiornate" || echo "::warning::Env vars (HTTP $RESULT)"

      - name: Regenerate Decap config
        run: |
          SLUG=${{ inputs.client_slug }}
          TMPL=${{ inputs.template }}
          cp "$TMPL/public/admin/config.template.yml" "clients/$SLUG/decap-config.yml"
          echo "✅ decap-config.yml rigenerato da $TMPL"

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Build template
        run: |
          BUILD_DIR="build-${{ inputs.client_slug }}"

          cp -r ${{ inputs.template }} "$BUILD_DIR"
          cp clients/${{ inputs.client_slug }}/decap-config.yml \
            "$BUILD_DIR/public/admin/config.yml"

          printf 'CLIENT_SLUG=${{ inputs.client_slug }}\nDEFAULT_LANG=${{ inputs.default_lang }}\n' \
            > "$BUILD_DIR/.env"

          cd "$BUILD_DIR"
          npm ci
          npm run build

          echo "BUILD_DIR=$PWD" >> $GITHUB_ENV

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
        run: |
          cd "$BUILD_DIR"
          netlify deploy --prod \
            --dir=dist \
            --site=$NETLIFY_SITE_ID \
            --message="Rebuild ${{ inputs.client_slug }} with ${{ inputs.template }}"

      - name: Commit updated config
        run: |
          SLUG=${{ inputs.client_slug }}
          git config user.name 'Ristogen Bot'
          git config user.email 'bot@ristogen.it'
          git add "clients/$SLUG/decap-config.yml"
          git diff --staged --quiet && echo "Nessuna modifica da committare" && exit 0
          git commit -m "config: rebuild $SLUG with ${{ inputs.template }}"
          git pull --rebase origin master
          git push origin HEAD:master
          echo "✅ Redeploy completato"
