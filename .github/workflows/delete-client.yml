name: Delete client
on:
  workflow_dispatch:
    inputs:
      client_slug:
        description: 'Slug cliente da eliminare'
        required: true

jobs:
  delete:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Remove client directory and commit
        run: |
          SLUG=${{ inputs.client_slug }}
          if [ ! -d "clients/$SLUG" ]; then
            echo "clients/$SLUG non esiste — nulla da fare"
            exit 0
          fi
          git config user.name 'Ristogen Bot'
          git config user.email 'bot@ristogen.it'
          git rm -r "clients/$SLUG"
          git commit -m "chore: elimina client $SLUG"
          git pull --rebase origin master
          git push origin HEAD:master
          echo "✅ clients/$SLUG rimosso"
