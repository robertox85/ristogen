name: Create new client
on:
  workflow_dispatch:
    inputs:
      client_slug:
        description: 'Slug cliente (es. burger-prati)'
        required: true
      template:
        description: 'Template da usare'
        required: true
        default: 'template-01'
        type: choice
        options: ['template-01', 'template-02']
      default_lang:
        description: 'Lingua principale'
        required: true
        default: 'it'
        type: choice
        options: ['it', 'en']
      custom_domain:
        description: 'Dominio personalizzato (es. www.ristoranteprati.it)'
        required: false
      menu_json:
        description: 'Array JSON categorie IT estratto da Claude (opzionale)'
        required: false

jobs:
  create:
    runs-on: ubuntu-latest
    environment: NETLIFY_TOKEN
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Create content structure
        run: |
          SLUG=${{ inputs.client_slug }}
          BASE=clients/$SLUG/content
          mkdir -p $BASE/it/menu $BASE/it/articles $BASE/en/menu $BASE/en/articles $BASE/images

          cat > $BASE/theme.json <<'EOF'
          {"template":"${{ inputs.template }}","colors":{"primary":"#111827","secondary":"#2563EB","background":"#ffffff","text":"#111827"},"fonts":{"heading":"Playfair Display","body":"Inter"}}
          EOF

          cat > $BASE/it/site.json <<'EOF'
          {"name":"","lang":"it","meta":{"title":"","description":"","og_image":"/images/og.jpg","og_type":"restaurant.restaurant","og_locale":"it_IT","og_site_name":"","twitter_card":"summary_large_image","canonical":""},"schema_org":{"type":"Restaurant","name":"","address":{"streetAddress":"","addressLocality":"","postalCode":"","addressRegion":"","addressCountry":"IT"},"telephone":"","servesCuisine":"","priceRange":"€€","openingHours":[]},"seo":{"llms_txt":true,"robots":"index, follow"},"analytics":{"ga4":"","clarity":""}}
          EOF

          cat > $BASE/en/site.json <<'EOF'
          {"name":"","lang":"en","meta":{"title":"","description":"","og_image":"/images/og.jpg","og_type":"restaurant.restaurant","og_locale":"en_US","og_site_name":"","twitter_card":"summary_large_image","canonical":""},"schema_org":{"type":"Restaurant","name":"","address":{"streetAddress":"","addressLocality":"","postalCode":"","addressRegion":"","addressCountry":"IT"},"telephone":"","servesCuisine":"","priceRange":"€€","openingHours":[]},"seo":{"llms_txt":true,"robots":"index, follow"},"analytics":{"ga4":"","clarity":""}}
          EOF

          echo '{"enabled":true,"headline":"","subheadline":"","image":"/images/hero.jpg","image_alt":""}' > $BASE/it/hero.json
          echo '{"enabled":true,"headline":"","subheadline":"","image":"/images/hero.jpg","image_alt":""}' > $BASE/en/hero.json
          echo '{"enabled":true,"title":"Chi siamo","text":""}' > $BASE/it/about.json
          echo '{"enabled":true,"title":"About us","text":""}' > $BASE/en/about.json
          echo '{"enabled":true,"indirizzo":"","telefono":"","orari":""}' > $BASE/it/contatti.json
          echo '{"enabled":true,"indirizzo":"","telefono":"","orari":""}' > $BASE/en/contatti.json
          echo '{"enabled":true,"images":[]}' > $BASE/it/gallery.json
          echo '{"enabled":true,"images":[]}' > $BASE/en/gallery.json
          echo '{"name":"Menu","items":[]}' > $BASE/en/menu/default.json
          touch $BASE/images/.gitkeep

      - name: Create IT menu files from JSON
        if: ${{ inputs.menu_json != '' }}
        env:
          MENU_PAYLOAD: ${{ inputs.menu_json }}
        run: |
          SLUG=${{ inputs.client_slug }}
          BASE=clients/$SLUG/content/it/menu
          echo "$MENU_PAYLOAD" | jq -c '.[]' | while read -r cat; do
            name=$(echo "$cat" | jq -r '.name')
            slug=$(echo "$name" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -cd '[:alnum:]-')
            echo "$cat" > "$BASE/${slug}.json"
          done

      - name: Generate Decap config.yml
        run: |
          SLUG=${{ inputs.client_slug }}
          TMPL=${{ inputs.template }}
          sed 's/burger-demo/'"$SLUG"'/g; s/template-01/'"$TMPL"'/g' \
            $TMPL/public/admin/config.yml | \
            sed '/local_backend/d' \
            > /tmp/config-$SLUG.yml
          cp /tmp/config-$SLUG.yml clients/$SLUG/decap-config.yml

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Create Netlify site
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
        run: |
          # 1. Crea il sito (solo nome)
          BODY=$(curl -sf -X POST https://api.netlify.com/api/v1/sites \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H 'Content-Type: application/json' \
            -d '{"name": "ristogen-${{ inputs.client_slug }}"}')
          SITE_ID=$(echo "$BODY" | jq -r '.id')
          SITE_URL=$(echo "$BODY" | jq -r '.ssl_url // .url')
          [ -z "$SITE_ID" ] || [ "$SITE_ID" = "null" ] && { echo "::error::Creazione sito fallita: $BODY"; exit 1; }
          echo "Sito creato: $SITE_URL (id=$SITE_ID)"
          echo "NETLIFY_SITE_ID=$SITE_ID" >> $GITHUB_ENV
          echo "NETLIFY_SITE_URL=$SITE_URL" >> $GITHUB_ENV

          # 2. Build settings — base dice a Netlify da quale sottocartella buildare
          #    quando il build hook viene triggerato da redeploy-client.yml
          PATCH_BODY=$(jq -n \
            --arg base "${{ inputs.template }}" \
            '{
              "build_settings": {
                "base": $base,
                "cmd": "npm run build",
                "dir": "dist"
              }
            }')
          PATCH_HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH \
            "https://api.netlify.com/api/v1/sites/$SITE_ID" \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H 'Content-Type: application/json' \
            -d "$PATCH_BODY")
          [ "$PATCH_HTTP" != "200" ] && { echo "::error::PATCH build_settings fallito (HTTP $PATCH_HTTP)"; exit 1; }
          echo "Build settings aggiornati (base: ${{ inputs.template }})"

          # 3. Env vars via CLI
          NETLIFY_SITE_ID=$SITE_ID netlify env:set CLIENT_SLUG "${{ inputs.client_slug }}"
          NETLIFY_SITE_ID=$SITE_ID netlify env:set DEFAULT_LANG "${{ inputs.default_lang }}"

          # 4. Build hook per i redeploy futuri
          HOOK_BODY=$(curl -sf -X POST \
            "https://api.netlify.com/api/v1/sites/$SITE_ID/build_hooks" \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H 'Content-Type: application/json' \
            -d '{"title":"Ristogen redeploy","branch":"master"}')
          HOOK_URL=$(echo "$HOOK_BODY" | jq -r '.url')
          [ -z "$HOOK_URL" ] || [ "$HOOK_URL" = "null" ] && { echo "::warning::Build hook non creato: $HOOK_BODY"; }
          echo "NETLIFY_BUILD_HOOK=$HOOK_URL" >> $GITHUB_ENV

      - name: Configure Netlify Identity and Git Gateway
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # 1. Abilita Identity
          curl -sf -X POST \
            "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID/identity" \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H 'Content-Type: application/json' \
            -d '{}' > /dev/null
          echo "Netlify Identity abilitato"

          # 2. Invite-only (non bloccante — alcuni piani non supportano questa API)
          INVITE_HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH \
            "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID/identity" \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H 'Content-Type: application/json' \
            -d '{"registration_preference":"invite"}')
          echo "Invite-only → HTTP $INVITE_HTTP"

          # 3. Git Gateway — senza questo Decap crasha su hasWriteAccess al login
          if [ -z "$GH_PAT" ]; then
            echo "::error::GH_PAT non configurato — Git Gateway non attivato. Decap CMS non funzionerà."
            exit 1
          fi
          GG_BODY=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID/services/git/instances" \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H 'Content-Type: application/json' \
            -d "{\"url\":\"https://github.com/robertox85/ristogen\",\"access_token\":\"$GH_PAT\"}")
          GG_HTTP=$(echo "$GG_BODY" | tail -1)
          GG_RESP=$(echo "$GG_BODY" | head -n -1)
          [ "$GG_HTTP" != "201" ] && { echo "::error::Git Gateway fallito (HTTP $GG_HTTP): $GG_RESP"; exit 1; }
          echo "Git Gateway attivo"

      - name: Build template
        run: |
          cd ${{ inputs.template }}
          printf 'CLIENT_SLUG=${{ inputs.client_slug }}\nDEFAULT_LANG=${{ inputs.default_lang }}\n' > .env
          npm ci
          npm run build
          rm .env

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
        run: |
          cd ${{ inputs.template }}
          netlify deploy --prod \
            --dir=dist \
            --site=$NETLIFY_SITE_ID \
            --message="Initial deploy for ${{ inputs.client_slug }}"

      - name: Commit
        run: |
          SLUG=${{ inputs.client_slug }}
          jq -n \
            --arg site_id "$NETLIFY_SITE_ID" \
            --arg site_url "$NETLIFY_SITE_URL" \
            --arg build_hook "$NETLIFY_BUILD_HOOK" \
            '{"site_id": $site_id, "site_url": $site_url, "build_hook": $build_hook}' \
            > "clients/$SLUG/netlify.json"
          git config user.name 'Ristogen Bot'
          git config user.email 'bot@ristogen.it'
          git add .
          git commit -m 'feat: add client ${{ inputs.client_slug }}'
          git pull --rebase origin master
          git push origin HEAD:master

      - name: Set custom domain
        if: ${{ inputs.custom_domain != '' }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
        run: |
          curl -sf -X PATCH "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID" \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H 'Content-Type: application/json' \
            -d '{"custom_domain": "${{ inputs.custom_domain }}"}'
