name: Create new client
on:
  workflow_dispatch:
    inputs:
      client_slug:
        description: 'Slug cliente (es. burger-prati)'
        required: true
      template:
        description: 'Template da usare'
        required: true
        default: 'template-01'
        type: choice
        options: ['template-01', 'template-02']
      default_lang:
        description: 'Lingua principale'
        required: true
        default: 'it'
        type: choice
        options: ['it', 'en']
      custom_domain:
        description: 'Dominio personalizzato (es. www.ristoranteprati.it)'
        required: false
      menu_json:
        description: 'Array JSON categorie IT estratto da Claude (opzionale)'
        required: false

jobs:
  create:
    runs-on: ubuntu-latest
    environment: NETLIFY_TOKEN
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop

      - name: Create content structure
        run: |
          SLUG=${{ inputs.client_slug }}
          BASE=clients/$SLUG/content
          mkdir -p $BASE/it/menu $BASE/it/articles $BASE/en/menu $BASE/en/articles $BASE/images

          # theme.json — condiviso, senza lingua
          cat > $BASE/theme.json <<'EOF'
          {"template":"${{ inputs.template }}","colors":{"primary":"#111827","secondary":"#2563EB","background":"#ffffff","text":"#111827"},"fonts":{"heading":"Playfair Display","body":"Inter"}}
          EOF

          # it/site.json
          cat > $BASE/it/site.json <<'EOF'
          {"name":"","lang":"it","meta":{"title":"","description":"","og_image":"/images/og.jpg","og_type":"restaurant.restaurant","og_locale":"it_IT","og_site_name":"","twitter_card":"summary_large_image","canonical":"https://"},"schema_org":{"type":"Restaurant","name":"","address":{"streetAddress":"","addressLocality":"","postalCode":"","addressRegion":"","addressCountry":"IT"},"telephone":"","servesCuisine":"","priceRange":"€€","openingHours":[]},"seo":{"llms_txt":true,"robots":"index, follow"},"analytics":{"ga4":"","clarity":""}}
          EOF

          # en/site.json
          cat > $BASE/en/site.json <<'EOF'
          {"name":"","lang":"en","meta":{"title":"","description":"","og_image":"/images/og.jpg","og_type":"restaurant.restaurant","og_locale":"en_US","og_site_name":"","twitter_card":"summary_large_image","canonical":"https://"},"schema_org":{"type":"Restaurant","name":"","address":{"streetAddress":"","addressLocality":"","postalCode":"","addressRegion":"","addressCountry":"IT"},"telephone":"","servesCuisine":"","priceRange":"€€","openingHours":[]},"seo":{"llms_txt":true,"robots":"index, follow"},"analytics":{"ga4":"","clarity":""}}
          EOF

          echo '{"enabled":true,"headline":"","subheadline":"","image":"/images/hero.jpg","image_alt":""}' > $BASE/it/hero.json
          echo '{"enabled":true,"headline":"","subheadline":"","image":"/images/hero.jpg","image_alt":""}' > $BASE/en/hero.json
          echo '{"enabled":true,"title":"Chi siamo","text":""}' > $BASE/it/about.json
          echo '{"enabled":true,"title":"About us","text":""}' > $BASE/en/about.json
          echo '{"enabled":true,"indirizzo":"","telefono":"","orari":""}' > $BASE/it/contatti.json
          echo '{"enabled":true,"indirizzo":"","telefono":"","orari":""}' > $BASE/en/contatti.json
          echo '{"enabled":true,"images":[]}' > $BASE/it/gallery.json
          echo '{"enabled":true,"images":[]}' > $BASE/en/gallery.json

          # Placeholder menu EN
          echo '{"name":"Menu","items":[]}' > $BASE/en/menu/default.json

          # Keep assets directory
          touch $BASE/images/.gitkeep

      - name: Create IT menu files from JSON
        if: ${{ inputs.menu_json != '' }}
        env:
          MENU_PAYLOAD: ${{ inputs.menu_json }}
        run: |
          SLUG=${{ inputs.client_slug }}
          BASE=clients/$SLUG/content/it/menu
          echo "$MENU_PAYLOAD" | jq -c '.[]' | while read -r cat; do
            name=$(echo "$cat" | jq -r '.name')
            slug=$(echo "$name" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -cd '[:alnum:]-')
            echo "$cat" > "$BASE/${slug}.json"
          done

      - name: Generate Decap config.yml
        run: |
          SLUG=${{ inputs.client_slug }}
          TMPL=${{ inputs.template }}
          sed 's/burger-demo/'"$SLUG"'/g; s/template-01/'"$TMPL"'/g' \
            $TMPL/public/admin/config.yml \
            > /tmp/config-$SLUG.yml
          cp /tmp/config-$SLUG.yml clients/$SLUG/decap-config.yml

      # ── NETLIFY: crea sito, env vars e build hook PRIMA di committare ──────
      - name: Create Netlify site
        run: |
          # 1. Crea il sito (solo nome — nessuna connessione repo via SSH)
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://api.netlify.com/api/v1/sites \
            -H 'Authorization: Bearer ${{ secrets.NETLIFY_TOKEN }}' \
            -H 'Content-Type: application/json' \
            -d '{"name": "ristogen-${{ inputs.client_slug }}"}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "Create site response ($HTTP_CODE): $BODY"
          if [ "$HTTP_CODE" != "201" ]; then
            echo "::error::Netlify create site fallito con codice $HTTP_CODE: $BODY"
            exit 1
          fi
          SITE_ID=$(echo "$BODY" | jq -r '.id')
          ACCOUNT_ID=$(echo "$BODY" | jq -r '.account_id')
          SITE_URL=$(echo "$BODY" | jq -r '.ssl_url // .url')
          echo "Sito creato: $SITE_URL (id=$SITE_ID, account=$ACCOUNT_ID)"
          echo "NETLIFY_SITE_ID=$SITE_ID" >> $GITHUB_ENV
          echo "NETLIFY_SITE_URL=$SITE_URL" >> $GITHUB_ENV

          # 2. Imposta le variabili d'ambiente CLIENT_SLUG e DEFAULT_LANG
          ENV_RES=$(curl -s -w "\n%{http_code}" \
            -X POST "https://api.netlify.com/api/v1/accounts/$ACCOUNT_ID/env?site_id=$SITE_ID" \
            -H 'Authorization: Bearer ${{ secrets.NETLIFY_TOKEN }}' \
            -H 'Content-Type: application/json' \
            -d '[
              {"key":"CLIENT_SLUG","values":[{"value":"${{ inputs.client_slug }}","context":"all"}]},
              {"key":"DEFAULT_LANG","values":[{"value":"${{ inputs.default_lang }}","context":"all"}]}
            ]')
          ENV_CODE=$(echo "$ENV_RES" | tail -n1)
          ENV_BODY=$(echo "$ENV_RES" | head -n-1)
          echo "Set env vars response ($ENV_CODE): $ENV_BODY"
          if [ "$ENV_CODE" != "201" ]; then
            echo "::error::Netlify set env vars fallito con codice $ENV_CODE: $ENV_BODY"
            exit 1
          fi

          # 3. Crea un build hook per i redeploy futuri (dopo modifiche contenuti)
          HOOK_RES=$(curl -s -X POST "https://api.netlify.com/api/v1/sites/$SITE_ID/build_hooks" \
            -H 'Authorization: Bearer ${{ secrets.NETLIFY_TOKEN }}' \
            -H 'Content-Type: application/json' \
            -d '{"title": "GitHub Actions redeploy", "branch": "master"}')
          HOOK_URL=$(echo "$HOOK_RES" | jq -r '.url')
          echo "Build hook creato: $HOOK_URL"
          echo "NETLIFY_BUILD_HOOK=$HOOK_URL" >> $GITHUB_ENV

      # ── BUILD: i file sono già su disco (non serve il commit) ──────────────
      - name: Build template
        run: |
          cd ${{ inputs.template }}
          # loadEnv() di Vite legge file .env, non le variabili shell — scriviamo prima
          printf 'CLIENT_SLUG=${{ inputs.client_slug }}\nDEFAULT_LANG=${{ inputs.default_lang }}\n' > .env
          npm ci
          npm run build
          rm .env

      - name: Deploy to Netlify
        run: |
          cd ${{ inputs.template }}
          npx netlify-cli@latest deploy --prod \
            --dir=dist \
            --site=$NETLIFY_SITE_ID \
            --auth=${{ secrets.NETLIFY_TOKEN }} \
            --message="Initial deploy for ${{ inputs.client_slug }}"

      # ── COMMIT: un solo commit a fine successo (repo pulito in caso di errore) ──
      - name: Commit
        run: |
          SLUG=${{ inputs.client_slug }}
          # Aggiungi netlify.json con i metadata del sito
          jq -n \
            --arg site_id "$NETLIFY_SITE_ID" \
            --arg site_url "$NETLIFY_SITE_URL" \
            --arg build_hook "$NETLIFY_BUILD_HOOK" \
            '{"site_id": $site_id, "site_url": $site_url, "build_hook": $build_hook}' \
            > "clients/$SLUG/netlify.json"
          git config user.name 'Ristogen Bot'
          git config user.email 'bot@ristogen.it'
          git add .
          git commit -m 'feat: add client ${{ inputs.client_slug }}'
          git push origin HEAD:master

      - name: Set custom domain
        if: ${{ inputs.custom_domain != '' }}
        run: |
          curl -s -X PATCH "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID" \
            -H 'Authorization: Bearer ${{ secrets.NETLIFY_TOKEN }}' \
            -H 'Content-Type: application/json' \
            -d '{"custom_domain": "${{ inputs.custom_domain }}"}'

