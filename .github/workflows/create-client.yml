name: Create new client
on:
  workflow_dispatch:
    inputs:
      client_slug:
        description: 'Slug cliente (es. burger-prati)'
        required: true
      template:
        description: 'Template da usare'
        required: true
        default: 'template-01'
        type: choice
        options: ['template-01', 'template-02']
      default_lang:
        description: 'Lingua principale'
        required: true
        default: 'it'
        type: choice
        options: ['it', 'en']
      custom_domain:
        description: 'Dominio personalizzato (es. www.ristoranteprati.it)'
        required: false
      menu_json:
        description: 'Array JSON categorie IT estratto da Claude (opzionale)'
        required: false

jobs:
  create:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Create content structure
        run: |
          SLUG=${{ inputs.client_slug }}
          # Clona burger-demo come base
          cp -r clients/burger-demo "clients/$SLUG"
          
          # Rimuovi netlify.json se esiste (è specifico di burger-demo)
          rm -f "clients/$SLUG/netlify.json"
          
          # Aggiorna il campo lang nei site.json
          # (i contenuti li compilerà il cliente via Decap)
          jq '.name = "" | .meta.title = "" | .meta.description = "" | .meta.canonical = ""' \
            "clients/$SLUG/content/it/site.json" > /tmp/site_it.json && \
            mv /tmp/site_it.json "clients/$SLUG/content/it/site.json"
          
          jq '.name = "" | .meta.title = "" | .meta.description = "" | .meta.canonical = ""' \
            "clients/$SLUG/content/en/site.json" > /tmp/site_en.json && \
            mv /tmp/site_en.json "clients/$SLUG/content/en/site.json"

      - name: Create IT menu files from JSON
        if: ${{ inputs.menu_json != '' }}
        env:
          MENU_PAYLOAD: ${{ inputs.menu_json }}
        run: |
          SLUG=${{ inputs.client_slug }}
          BASE=clients/$SLUG/content/it/menu
          echo "$MENU_PAYLOAD" | jq -c '.[]' | while read -r cat; do
            name=$(echo "$cat" | jq -r '.name')
            slug=$(echo "$name" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -cd '[:alnum:]-')
            echo "$cat" > "$BASE/${slug}.json"
          done

      - name: Generate Decap config
        run: |
          SLUG=${{ inputs.client_slug }}
          TMPL=${{ inputs.template }}
          sed 's/burger-demo/'"$SLUG"'/g; s/template-01/'"$TMPL"'/g' \
            $TMPL/public/admin/config.template.yml | \
            sed '/local_backend/d' \
            > clients/$SLUG/decap-config.yml

      - name: Create Netlify site with repo
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
          NETLIFY_ACCOUNT_ID: ${{ secrets.NETLIFY_ACCOUNT_ID }}
          NETLIFY_INSTALLATION_ID: ${{ secrets.NETLIFY_INSTALLATION_ID }}
          GITHUB_REPO: ${{ secrets.GH_REPO }}
          GITHUB_REPO_ID: ${{ secrets.GH_REPO_ID }}
        run: |
          # Crea sito con repo collegato in una sola chiamata
          BODY=$(curl -s -X POST "https://api.netlify.com/api/v1/sites" \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"ristogen-${{ inputs.client_slug }}\",
              \"repo\": {
                \"provider\": \"github\",
                \"repo\": \"$GITHUB_REPO\",
                \"repo_id\": $GITHUB_REPO_ID,
                \"installation_id\": $NETLIFY_INSTALLATION_ID,
                \"branch\": \"master\",
                \"cmd\": \"npm run build\",
                \"dir\": \"dist\",
                \"base\": \"${{ inputs.template }}\"
              }
            }")

          SITE_ID=$(echo "$BODY" | jq -r '.id')
          SITE_URL=$(echo "$BODY" | jq -r '.ssl_url // .url')
          [ -z "$SITE_ID" ] || [ "$SITE_ID" = "null" ] && { echo "::error::Creazione sito fallita: $BODY"; exit 1; }
          echo "Sito creato: $SITE_URL (id=$SITE_ID)"
          echo "NETLIFY_SITE_ID=$SITE_ID" >> $GITHUB_ENV
          echo "NETLIFY_SITE_URL=$SITE_URL" >> $GITHUB_ENV
          echo "RESPONSE: $BODY"

      - name: Set environment variables
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
          NETLIFY_ACCOUNT_ID: ${{ secrets.NETLIFY_ACCOUNT_ID }}
        run: |
          RESULT=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://api.netlify.com/api/v1/accounts/$NETLIFY_ACCOUNT_ID/env?site_id=$NETLIFY_SITE_ID" \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "[
              {
                \"key\": \"CLIENT_SLUG\",
                \"scopes\": [\"builds\", \"functions\", \"runtime\", \"post_processing\"],
                \"values\": [{\"context\": \"all\", \"value\": \"${{ inputs.client_slug }}\"}]
              },
              {
                \"key\": \"DEFAULT_LANG\",
                \"scopes\": [\"builds\", \"functions\", \"runtime\", \"post_processing\"],
                \"values\": [{\"context\": \"all\", \"value\": \"${{ inputs.default_lang }}\"}]
              }
            ]")
          [ "$RESULT" != "201" ] && { echo "::error::Env vars fallite (HTTP $RESULT)"; exit 1; }
          echo "Env vars impostate (CLIENT_SLUG=${{ inputs.client_slug }}, DEFAULT_LANG=${{ inputs.default_lang }})"

      - name: Configure Netlify Identity
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
        run: |
          # Abilita Identity
          IDENTITY_BODY=$(curl -sf -X POST \
            "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID/identity" \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{}')
          IDENTITY_ID=$(echo "$IDENTITY_BODY" | jq -r '.id')
          [ -z "$IDENTITY_ID" ] || [ "$IDENTITY_ID" = "null" ] && { echo "::error::Identity non abilitata: $IDENTITY_BODY"; exit 1; }
          echo "Identity abilitata (id=$IDENTITY_ID)"

          # Invite-only
          INVITE_HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
            "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID/identity/$IDENTITY_ID" \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"disable_signup": true}')
          [ "$INVITE_HTTP" != "200" ] && [ "$INVITE_HTTP" != "204" ] && \
            echo "::warning::Invite-only non impostato (HTTP $INVITE_HTTP)" || \
            echo "Invite-only attivo"

      - name: Configure Git Gateway
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPO: ${{ secrets.GH_REPO }}
        run: |
          if [ -z "$GH_PAT" ]; then
            echo "::error::GH_PAT non configurato"
            exit 1
          fi
          GG_BODY=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID/services/git/instances" \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"github\": {\"access_token\": \"$GH_PAT\", \"repo\": \"$GITHUB_REPO\"}}")
          GG_HTTP=$(echo "$GG_BODY" | tail -1)
          GG_RESP=$(echo "$GG_BODY" | head -n -1)
          [ "$GG_HTTP" != "201" ] && { echo "::error::Git Gateway fallito (HTTP $GG_HTTP): $GG_RESP"; exit 1; }
          echo "Git Gateway attivo"

      - name: Build template
        run: |
          SLUG=${{ inputs.client_slug }}
          BUILD_DIR="build-$SLUG"
          
          cp -r ${{ inputs.template }} "$BUILD_DIR"
          cp "clients/$SLUG/decap-config.yml" "$BUILD_DIR/public/admin/config.yml"
          printf 'CLIENT_SLUG=%s\nDEFAULT_LANG=%s\n' "$SLUG" "${{ inputs.default_lang }}" \
            > "$BUILD_DIR/.env"
          
          cd "$BUILD_DIR"
          npm ci
          npm run build
          
          echo "BUILD_DIR=$PWD" >> $GITHUB_ENV

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
        run: |
          npm install -g netlify-cli
          cd "$BUILD_DIR"
          netlify deploy --prod \
            --dir=dist \
            --site=$NETLIFY_SITE_ID \
            --message="Initial deploy for ${{ inputs.client_slug }}"

      - name: Commit
        run: |
          SLUG=${{ inputs.client_slug }}
          jq -n \
            --arg site_id "$NETLIFY_SITE_ID" \
            --arg site_url "$NETLIFY_SITE_URL" \
            '{"site_id": $site_id, "site_url": $site_url}' \
            > "clients/$SLUG/netlify.json"
          git config user.name 'Ristogen Bot'
          git config user.email 'bot@ristogen.it'
          git add .
          git commit -m "feat: add client ${{ inputs.client_slug }}"
          git pull --rebase origin master
          git push origin HEAD:master

      - name: Set custom domain
        if: ${{ inputs.custom_domain != '' }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
        run: |
          curl -sf -X PATCH "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID" \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"custom_domain\": \"${{ inputs.custom_domain }}\"}"
